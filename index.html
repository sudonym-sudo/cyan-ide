<!doctype html>
<html>
<head>
<link rel=icon href=/favicon.png>
<meta name=viewport content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel=stylesheet>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<title>cyλnide</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
    <h1><span>c</span><span>y</span><span>λ</span><span>n</span><span>i</span><span>d</span><span>e</span></h1>
    
    <div style="display:flex;gap:1rem;justify-content:center;margin-top:2rem">
      <a href="cyanide.html" download="cyanide.html" style="text-decoration:none">
        <button style="display:flex;align-items:center;gap:8px">
          <span class="material-icons">download</span>
          Download
        </button>
      </a>
      <button onclick="launchCyanide()" style="display:flex;align-items:center;gap:8px">
        <span class="material-icons">launch</span>
        Launch
      </button>
    </div>

<script>
function launchCyanide() {
  let tab = window.open('about:blank', '_blank');
  fetch('cyanide.html').then(r => r.text()).then(html => {
    let injected = html.replace(/<\/head>/i, `
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; img-src * data: blob:; frame-src *; fullscreen *;">
` + '</head>');
    tab.document.open();
    tab.document.write(injected);
    tab.document.close();
    setTimeout(() => {
      let d = tab.document;
      if (d.body) {
        d.body.style.margin = '0';
        d.body.style.padding = '0';
        d.body.style.height = '100vh';
        d.body.style.width = '100vw';
        d.body.style.overflow = 'hidden';
      }
    }, 300);
  }).catch(() => tab.close());
}
</script>
</body>
</html>
