<!DOCTYPE html>
<html>
<head>
    <title>Home - Google Drive</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        .navbar { height: 48px; background: #000; display: flex; align-items: center; padding: 0 12px; gap: 12px; border-bottom: 1px solid #111; }
        .address-bar { flex-grow: 1; height: 32px; background: #111; border-radius: 16px; display: flex; align-items: center; padding: 0 16px; border: 1px solid #222; }
        .address-bar input { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 13px; outline: none; }
        iframe { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="address-bar">
            <input type="text" id="urlInput" />
        </div>
    </div>
    <iframe id="proxyIframe"></iframe>
    <script>
        const input = document.getElementById('urlInput');
        const iframe = document.getElementById('proxyIframe');
        
        function load(url) {
            const finalUrl = url.startsWith('http') ? url : 'https://' + url;
            input.value = finalUrl;
            iframe.src = "https://reds-exploit-corner.examprepare.help/embed.html#" + finalUrl;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') load(input.value);
        });

        const initialUrl = window.location.hash.substring(1);
        if (initialUrl) load(initialUrl);
    </script>
</body>
</html>
